<!DOCTYPE html>
<html lang="fr">
  <head>
    <title>SAE2.03 APP</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./component/Movie/style.css" />
    <link rel="stylesheet" href="./css/base.css" />
    </head>

  <body>
    <header id="header"></header>

    <section id="content"></section>

    <script type="module">
      import { NavBar } from "./component/NavBar/script.js";
      import { Movie } from "./component/Movie/script.js";

      // --- CONTROLEUR --- //
      window.C = {};

      C.handlerAbout = function () {
        alert(
          "Ceci est une base de projet pour la SAE2.03 édition 2025. Bonne chance !"
        );
      };

      C.start = function () {
    
        V.renderNavBar("C.handlerAbout()");

        const testData = [
          {
            title: "Interstellar",
            year: "2014",
            poster: "../server/images/interstellar.jpg",
            description: "Un groupe d'explorateurs voyage à travers un trou de ver pour sauver l'humanité.",
            director: "Christopher Nolan",
            trailer: "https://www.youtube.com/embed/VaOijhK3CRU?si=76Ke4uw4LYjuLuQ6"
          },
          {
            title: "La Liste de Schindler",
            year: "1993",
            poster: "../server/images/schindler.webp",
            description: "Un industriel allemand sauve des milliers de Juifs pendant l'Holocauste.",
            director: "Steven Spielberg",
            trailer: "https://www.youtube.com/embed/ONWtyxzl-GE?si=xC3ASGGPy5Ib-aPn"
          }
        ];

        V.renderMovies(testData);
      };

      // --- VUE --- //
      window.V = {};

      V.renderNavBar = function (hAbout) {
        let header = document.querySelector("#header");
        header.innerHTML = NavBar.format(hAbout);
      };

      V.renderMovies = function (movies) {
        let content = document.querySelector("#content");
        content.innerHTML = Movie.format(movies);
      };

      C.start();
    </script>
  </body>
</html>
