<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>SAE2.03 APP</title>
    <link rel="stylesheet" href="./css/base.css">
    <link rel="stylesheet" href="./component/NavBar/style.css">
</head>

<body>

    <header id="navbar-container"></header>

    <main id="main-content"></main>

    <script type="module">
        import { DataMovie } from "./data/dataMovie.js";
        import { DataProfile } from "./data/dataProfile.js";
        import { Movie } from "./component/Movie/script.js";
        import { MovieDetail } from "./component/MovieDetail/script.js";
        import { NavBar } from "./component/NavBar/script.js";
        import { MovieCategory } from "./component/MovieCategory/script.js";

        window.C = {};
        window.V = {};

        window.state = {
            profiles: [],
            activeProfile: null
        };

        C.start = async function () {
            V.renderLog("Démarrage...");

            state.profiles = await DataProfile.read();

            V.renderNavBar();

            await C.handlerHome();
        };

        C.handlerHome = async function () {
            V.renderLog("Chargement des films...");

            let ageLimit = 0;
            if (window.state.activeProfile && window.state.activeProfile.age_restriction !== undefined) {
                ageLimit = window.state.activeProfile.age_restriction;
            }

            const moviesGrouped = await DataMovie.requestMovies(ageLimit);

            const main = document.querySelector("#main-content");

            const hasMovies = moviesGrouped && Object.keys(moviesGrouped).length > 0;

            if (hasMovies) {
                V.renderMovieList(moviesGrouped);
            } else {
                let html = `<p class="no-movies">Aucun film disponible pour votre tranche d'âge (${ageLimit}+).</p>`;

                if (!window.state.activeProfile) {
                    html += `<p style="text-align:center; color:gray;">Sélectionnez un utilisateur pour afficher une liste de films personnalisée.</p>`;
                }

                main.innerHTML = html;
            }
        }

        C.handlerChangeProfile = function (event) {
            let id = event.target.value;
            window.state.activeProfile = window.state.profiles.find(p => p.id == id);

            V.renderLog("Profil sélectionné: " + (window.state.activeProfile ? window.state.activeProfile.name : "Aucun"));

            V.renderNavBar();

            C.handlerHome();
        };

        C.handlerDetail = async function (id) {
            V.renderLog("Chargement des détails...");
            let movie = await DataMovie.requestMovieDetails(id);
            V.renderDetail(movie);
        };

        V.renderNavBar = function () {
            let container = document.querySelector("#navbar-container");
            container.innerHTML = NavBar.format(window.state.profiles, window.state.activeProfile);

            let select = document.querySelector("#profile-selector");
            if (select) {
                select.onchange = C.handlerChangeProfile;
            }
        };

        V.renderMovieList = function (groupedMovies) {
            let content = document.querySelector("#main-content");
            content.innerHTML = "";

            for (const [categoryName, moviesList] of Object.entries(groupedMovies)) {
                content.innerHTML += MovieCategory.format(categoryName, moviesList);
            }
        };

        V.renderDetail = function (movie) {
            let content = document.querySelector("#main-content");
            content.innerHTML = MovieDetail.format(movie);
        };

        V.renderLog = function (message) {
            console.log("[App]: " + message);
        };

        C.start();

        C.handlerAddFavorite = async function (id_movie) {
            if (!window.state.activeProfile) {
                alert("Пожалуйста, выберите профиль!");
                return;
            }

            let res = await DataMovie.addFavorite(window.state.activeProfile.id, id_movie);
            if (res.success) {
                alert("Le film a été ajouté à vos favoris.");
            }
        };

C.handlerShowFavorites = async function () {
            if (!window.state.activeProfile) return;

            V.renderLog("Chargement des favoris...");
            
            const idProfile = window.state.activeProfile.id;
            const favorites = await DataMovie.getFavorites(idProfile);

            // ИСПРАВЛЕНО: используем правильный ID из твоего HTML
            const mainContainer = document.querySelector('#main-content'); 

            if (favorites.length === 0) {
                mainContainer.innerHTML = '<h2 style="text-align:center; padding:20px;">Maintenant cette section est vide. Ajoutez des films.</h2>';
                return;
            }

            let html = '<h2 style="padding:20px; text-align:center;">Mes Favoris</h2>';
            
            // Обертка для карточек (проверь класс, который используется в MovieCategory)
            html += '<div class="movie-list" style="display:flex; flex-wrap:wrap; gap:20px; justify-content:center;">'; 

            for (let movie of favorites) {
                // Movie.format вернет готовую карточку
                html += Movie.format(movie);
            }

            html += '</div>';
            mainContainer.innerHTML = html;
        };

    </script>
</body>

</html>
