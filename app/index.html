<!DOCTYPE html>
<html lang="fr">
<head>
    <title>SAE2.03 APP</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./component/Movie/style.css" />
    <link rel="stylesheet" href="./css/base.css" />
    
</head>

<body>
    <header id="header"></header>
    <section id="content"></section>

    <script type="module">
        import { NavBar } from "./component/NavBar/script.js";
        import { Movie } from "./component/Movie/script.js";
        import { DataMovie } from "./data/dataMovie.js";

        window.C = {};

        C.handlerAbout = function () {
            alert("Ceci est une base de projet pour la SAE2.03 édition 2026. Bonne chance !");
        };


        C.getMovie = async function() {
            let data = await DataMovie.requestMovies(); 
            V.renderMovie(data);
            console.log(data)
        };

        C.start = function () {
            V.renderNavBar("C.handlerAbout()");
            C.getMovie(); 
        };

       
        window.V = {};

        V.renderNavBar = function (hAbout) {
            let header = document.querySelector("#header");
            header.innerHTML = NavBar.format(hAbout);
        };

        V.renderMovie = function (allmovie) {
            let content = document.querySelector("#content");
            
            content.innerHTML = Movie.format(allmovie); 
        };

        
        C.start();
    </script>
</body>
</html>
