<article class="movie-card">
    <div class="movie-poster">
        <img src="{{poster}}" alt="Affiche {{title}}">
    </div>
    <div class="movie-info">
        <h2>{{title}} ({{year}})</h2>
        <p><strong>Description:</strong> {{description}}</p>
        <p><strong>Director:</strong> {{director}}</p>
        <p class="trailer">
            Trailer: cliquez <a href="{{trailer}}" target="_blank">ici</a> pour voir le trailer
        </p>
    </div>
</article>
