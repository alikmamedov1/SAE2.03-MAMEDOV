<!DOCTYPE html>
<html lang="fr">

<head>
  <title>SAE2.03 ADMIN</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./css/base.css">
</head>

<body>
  <section id="log"></section>
  <section id="form-container"></section>
  <section id="profile-form-container"></section>

  <script type="module">

    import { Log } from "./component/Log/script.js";
    import { MovieForm } from "./component/MovieForm/script.js";
    import { ProfileForm } from "./component/ProfileForm/script.js";
    import { DataMovie } from "../app/data/dataMovie.js?update=123";
    import { DataProfile } from "../app/data/dataProfile.js?update=123";

    window.C = {};
    window.V = {};

    // --- НОВАЯ ФУНКЦИЯ ДЛЯ ЗАГРУЗКИ КАТЕГОРИЙ ---
    C.loadCategories = async function () {
      try {
        // Вызываем сервер через script.php?todo=readCategories
        let response = await fetch("../server/script.php?todo=readCategories");
        let categories = await response.json();

        // Находим селектор внутри уже отрисованной формы
        let select = document.querySelector("#id_category");
        
        if (select && categories) {
          select.innerHTML = ""; // Очищаем старые 5 категорий
          categories.forEach(cat => {
            let option = document.createElement("option");
            option.value = cat.id;
            option.textContent = cat.name;
            select.appendChild(option);
          });
          V.renderLog("Catégories chargées avec succès");
        }
      } catch (error) {
        V.renderLog("Erreur lors du chargement des catégories");
        console.error(error);
      }
    };

    C.start = async function () { // Добавили async
      V.renderLog("Démarrage de l'application");
      V.renderForm();
      
      // После отрисовки формы загружаем в неё данные из БД
      await C.loadCategories();
    };

    V.renderLog = function (txt) {
      let content = document.querySelector("#log");
      if (content) content.innerHTML = Log.format(txt);
    };

    V.renderForm = function () {

      let movieContent = document.querySelector("#form-container");
      if (movieContent) {
        movieContent.innerHTML = MovieForm.format();
        let fMovie = document.querySelector("#movieForm");
        if (fMovie) fMovie.onsubmit = C.handlerAddMovie;
      }

      let profileContent = document.querySelector("#profile-form-container");
      if (profileContent) {
        profileContent.innerHTML = ProfileForm.format();
        let fProfile = document.querySelector("#profileForm");
        if (fProfile) fProfile.onsubmit = C.handlerAddProfile;
      }
    };

    C.handlerAddMovie = async function (event) {
      event.preventDefault();
      let formData = {
        name: document.querySelector("#name").value,
        director: document.querySelector("#director").value,
        year: document.querySelector("#year").value,
        length: document.querySelector("#length").value,
        description: document.querySelector("#description").value,
        image: document.querySelector("#image").value,
        trailer: document.querySelector("#trailer").value,
        min_age: document.querySelector("#min_age").value,
        id_category: document.querySelector("#id_category").value
      };

      V.renderLog("Envoi du film en cours...");
      let res = await DataMovie.add(formData);
      if (res) V.renderLog("Réponse (Film): " + res.message);
    };

    C.handlerAddProfile = async function (event) {
      event.preventDefault();
      let profileData = {
        name: document.querySelector("#p_name").value,
        avatar: document.querySelector("#p_avatar").value,
        age_restriction: document.querySelector("#p_age").value
      };

      V.renderLog("Création du profil en cours...");
      let res = await DataProfile.add(profileData);
      if (res) V.renderLog("Réponse (Profil): " + res.message);
    };

    C.start();

  </script>
</body>
</html>
